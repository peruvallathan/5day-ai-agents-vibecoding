  <text x="460" y="72" font-family="sans-serif" font-size="11" fill="#666">+ Filter</text>
  <text x="860" y="72" font-family="sans-serif" font-size="13" fill="#555">↻ ⋮</text>
  <rect x="321" y="82" width="579" height="0.5" fill="#2a2a2a"/>

