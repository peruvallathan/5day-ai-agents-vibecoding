  <text x="420" y="226" font-family="sans-serif" font-size="12" fill="#c8e6c9">Standard delivery takes </text>
  <text x="563" y="226" font-family="sans-serif" font-size="12" fill="#81c784" font-weight="500">3–5 business days.</text>
  <text x="420" y="245" font-family="sans-serif" font-size="12" fill="#c8e6c9">If you need your package sooner, express delivery</text>
  <text x="420" y="263" font-family="sans-serif" font-size="12" fill="#c8e6c9">arrives within </text>
  <text x="505" y="263" font-family="sans-serif" font-size="12" fill="#81c784" font-weight="500">1–2 business days.</text>
  <text x="420" y="282" font-family="sans-serif" font-size="12" fill="#c8e6c9">Anything else I can help with?</text>

