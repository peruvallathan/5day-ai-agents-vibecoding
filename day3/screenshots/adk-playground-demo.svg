  <text x="360" y="108" font-family="sans-serif" font-size="11" fill="#555">#19</text>
  <rect x="530" y="92" width="308" height="30" rx="14" fill="#2196f3"/>
  <text x="684" y="111" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">How long does standard delivery take?</text>
