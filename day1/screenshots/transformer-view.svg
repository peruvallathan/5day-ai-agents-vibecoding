  <rect width="1200" height="56" fill="#050506" fill-opacity="0.9"/>
  <rect width="1200" height="1" y="56" fill="#ffffff" fill-opacity="0.05"/>
  <!-- Pulse dot -->
  <circle cx="24" cy="28" r="5" fill="#3b82f6">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="36" y="33" font-family="monospace" font-size="12" font-weight="600" fill="#ffffff" letter-spacing="2">AEGIS OBSERVABILITY CONSOLE</text>
  <text x="230" y="33" font-family="monospace" font-size="11" fill="#3b82f6" fill-opacity="0.8">v2.4.0</text>
  <text x="900" y="33" font-family="monospace" font-size="10" fill="#3b82f6" letter-spacing="2">SYSTEM: HEALTHY</text>
  <text x="1040" y="33" font-family="monospace" font-size="10" fill="#64748b" letter-spacing="2">CLUSTER: US-EAST-1</text>

  <!-- LEFT SIDEBAR (w=256) -->
  <rect x="0" y="57" width="256" height="595" fill="#050506" fill-opacity="0.8"/>
  <rect x="255" y="57" width="1" height="595" fill="#ffffff" fill-opacity="0.05"/>

  <!-- Model Metadata label -->
  <circle cx="20" cy="84" r="4" fill="#3b82f6"/>
  <text x="32" y="89" font-family="monospace" font-size="9" fill="#64748b" letter-spacing="3">MODEL METADATA</text>

  <!-- Active model card -->
  <rect x="12" y="100" width="232" height="48" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <text x="20" y="116" font-family="monospace" font-size="9" fill="#64748b">ACTIVE MODEL</text>
  <text x="20" y="136" font-family="monospace" font-size="12" fill="#ffffff" font-weight="600" letter-spacing="1">GPT-NEOX-7B</text>

  <!-- Meta items -->
  <g font-family="monospace" font-size="10" fill="#94a3b8">
    <text x="20" y="170">Architecture</text><text x="180" y="170" fill="#ffffff">Decoder-only</text>
    <line x1="12" y1="178" x2="244" y2="178" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="20" y="196">Parameters</text><text x="180" y="196" fill="#ffffff">7.4B</text>
    <line x1="12" y1="204" x2="244" y2="204" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="20" y="222">Device</text><text x="180" y="222" fill="#3b82f6" font-family="monospace">H100 80GB</text>
    <line x1="12" y1="230" x2="244" y2="230" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="20" y="248">Precision</text><text x="180" y="248" fill="#ffffff">BFloat16</text>
    <line x1="12" y1="256" x2="244" y2="256" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="20" y="274">Context</text><text x="180" y="274" fill="#ffffff">2048 tokens</text>
    <line x1="12" y1="282" x2="244" y2="282" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="20" y="300">Batch Size</text><text x="180" y="300" fill="#ffffff">128</text>
    <line x1="12" y1="308" x2="244" y2="308" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="20" y="326">Memory</text><text x="180" y="326" fill="#ffffff">14.8 GB</text>
    <line x1="12" y1="334" x2="244" y2="334" stroke="#ffffff" stroke-opacity="0.05"/>
