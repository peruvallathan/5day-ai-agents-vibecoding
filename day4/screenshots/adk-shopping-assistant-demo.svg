  <text x="476" y="152" font-family="monospace" font-size="10" fill="#90caf9">redeem_discount</text>
  <text x="404" y="163" font-family="monospace" font-size="10" fill="#666">  user_id="user_123"  code="WELCOME50"</text>

  <!-- Event #3 — tool result -->
  <text x="348" y="202" font-family="sans-serif" font-size="11" fill="#555">#3</text>
  <circle cx="376" cy="197" r="13" fill="#4caf50"/>
  <text x="376" y="202" font-family="sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">S</text>
  <rect x="396" y="184" width="440" height="26" rx="4" fill="#1a2a1a" stroke="#2a3a2a" stroke-width="0.5"/>
  <text x="404" y="194" font-family="monospace" font-size="10" fill="#888">← Tool result: </text>
  <text x="404" y="205" font-family="monospace" font-size="10" fill="#4caf50">Success: Discount code 'WELCOME50' has been successfully redeemed for user 'user_123'.</text>

  <!-- Event #4 — agent final response -->
