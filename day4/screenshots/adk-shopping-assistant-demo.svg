  <text x="406" y="262" font-family="sans-serif" font-size="12" fill="#c8e6c9">Great news! I've successfully redeemed discount code</text>
  <text x="406" y="279" font-family="sans-serif" font-size="12" fill="#81c784" font-weight="500">WELCOME50</text>
  <text x="476" y="279" font-family="sans-serif" font-size="12" fill="#c8e6c9"> for user </text>
  <text x="533" y="279" font-family="sans-serif" font-size="12" fill="#81c784" font-weight="500">user_123</text>
  <text x="590" y="279" font-family="sans-serif" font-size="12" fill="#c8e6c9">.</text>
  <text x="406" y="297" font-family="sans-serif" font-size="12" fill="#c8e6c9">The discount has been applied and the code is now marked as used.</text>
  <text x="406" y="314" font-family="sans-serif" font-size="12" fill="#c8e6c9">Is there anything else I can help you with?</text>

