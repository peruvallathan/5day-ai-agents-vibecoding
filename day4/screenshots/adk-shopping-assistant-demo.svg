  <rect x="0" y="110" width="320" height="0.5" fill="#2a2a2a"/>

  <!-- Invocation label -->
  <text x="16" y="130" font-family="sans-serif" font-size="11" fill="#888">Invocation: </text>
  <text x="88" y="130" font-family="sans-serif" font-size="11" fill="#90caf9">#4 (Can you redeem the discount code ...</text>
